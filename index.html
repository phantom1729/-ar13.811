<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Aryan's Real World 3D Open World</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 15px; border-radius: 10px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        .controls-hint { position: absolute; bottom: 20px; left: 20px; color: white; background: rgba(0,0,0,0.5); padding: 5px; }
    </style>
</head>
<body>

<div id="ui">
    <h2 style="margin:0 0 5px 0; color:#3498db">Project: Real World</h2>
    Paisa: ₹<span id="money">1000</span><br>
    Status: <span style="color:#2ecc71">Exploring</span>
</div>

<div id="crosshair"></div>
<div class="controls-hint">Use WASD to Move | Mouse to Look | Click to Start</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/examples/jsm/controls/PointerLockControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls';

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87ceeb, 10, 100); // FOG for realism

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.y = 2; // Player height

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- Lighting (Real-World Sunshine) ---
    const ambientLight = new THREE.AmbientLight(0x404040, 2);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 3);
    directionalLight.position.set(10, 20, 10).normalize();
    scene.add(directionalLight);

    // --- Controls (First Person / FPS like Rope Hero) ---
    const controls = new PointerLockControls(camera, document.body);
    document.addEventListener('click', () => controls.lock());

    // --- Realistic Map (Ground & Sky) ---
    const textureLoader = new THREE.TextureLoader();

    // Ground: Road Texture (REAL WORLD)
    const groundTexture = textureLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(100, 100); // Repeat for a large map

    const groundGeo = new THREE.PlaneGeometry(500, 500);
    const groundMat = new THREE.MeshPhongMaterial({ map: groundTexture });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Skybox (REAL WORLD ENV)
    const skyGeo = new THREE.SphereGeometry(250, 32, 32);
    const skyMat = new THREE.MeshBasicMaterial({
        color: 0x87ceeb,
        side: THREE.BackSide,
    });
    scene.add(new THREE.Mesh(skyGeo, skyMat));

    // --- Buildings ---
    const buildingGroup = new THREE.Group();
    const buildGeo = new THREE.BoxGeometry(10, 1, 10);
    const buildMat = new THREE.MeshPhongMaterial({ color: 0x888888, specular: 0x050505, shininess: 50 });

    for (let i = 0; i < 50; i++) {
        const height = Math.random() * 30 + 10;
        const b = new THREE.Mesh(buildGeo, buildMat);
        b.scale.y = height;
        b.position.set(Math.random() * 300 - 150, (height * 1) / 2, Math.random() * 300 - 150);
        buildingGroup.add(b);
    }
    scene.add(buildingGroup);

    // --- Movement Physics (Simple) ---
    let moveForward = false;
    let moveBackward = false;
    let moveLeft = false;
    let moveRight = false;

    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();
    const clock = new THREE.Clock();

    document.addEventListener('keydown', (e) => {
        if(e.code === 'KeyW') moveForward = true;
        if(e.code === 'KeyS') moveBackward = true;
        if(e.code === 'KeyA') moveLeft = true;
        if(e.code === 'KeyD') moveRight = true;
    });

    document.addEventListener('keyup', (e) => {
        if(e.code === 'KeyW') moveForward = false;
        if(e.code === 'KeyS') moveBackward = false;
        if(e.code === 'KeyA') moveLeft = false;
        if(e.code === 'KeyD') moveRight = false;
    });

    // --- Animation Loop ---
    function animate() {
        requestAnimationFrame(animate);

        if (controls.isLocked) {
            const delta = clock.getDelta();

            // Simple Physics (Friction, Movement)
            velocity.x -= velocity.x * 10.0 * delta;
            velocity.z -= velocity.z * 10.0 * delta;

            direction.z = Number(moveForward) - Number(moveBackward);
            direction.x = Number(moveRight) - Number(moveLeft);
            direction.normalize(); // Ensure constant speed

            if (moveForward || moveBackward) velocity.z -= direction.z * 150.0 * delta;
            if (moveLeft || moveRight) velocity.x -= direction.x * 150.0 * delta;

            controls.moveRight(-velocity.x * delta);
            controls.moveForward(-velocity.z * delta);
        }

        renderer.render(scene, camera);
    }

    animate();

    // --- Window Resize ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
