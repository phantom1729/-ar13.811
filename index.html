<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raksha Elite - Final Version</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --neon-blue: #00d2ff;
            --alert-red: #ff3333;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: var(--bg-gradient);
            color: #fff; margin: 0; padding: 0;
            min-height: 100vh; user-select: none;
            text-align: center; overflow-x: hidden; padding-bottom: 90px;
        }

        #initOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 100000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-family: 'Orbitron'; color: var(--neon-blue); cursor: pointer; backdrop-filter: blur(10px);
        }

        .header-container {
            padding: 40px 20px 30px;
            background: radial-gradient(circle at top, #1a237e, #000);
            border-bottom: 2px solid var(--neon-blue);
            border-bottom-left-radius: 40px; border-bottom-right-radius: 40px;
        }

        .shield-wrapper { position: relative; width: 120px; height: 140px; margin: 0 auto 15px; cursor: pointer; }
        .shield-outer { width: 100%; height: 100%; background: #fff; clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); display: flex; align-items: center; justify-content: center; }
        .shield-inner { width: 94%; height: 94%; background-color: #222; background-size: cover; background-position: center; clip-path: polygon(50% 0, 100% 25%, 100% 75%, 50% 100%, 0 75%, 0 25%); }

        .content-container { padding: 20px; }
        .btn {
            width: 100%; border: none; border-radius: 16px; padding: 18px; margin-bottom: 15px;
            font-family: 'Poppins', sans-serif; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            color: white; background: var(--glass-bg); border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-sos { background: linear-gradient(135deg, #d50000, #990000); height: 100px; font-size: 20px; animation: pulse 2s infinite; }
        
        .id-input { width: 100%; padding: 12px; margin: 8px 0; background: #222; color: white; border: 1px solid #444; border-radius: 8px; box-sizing: border-box; }
        
        #safetyPrompt { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 100000; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Floating Support Buddy */
        .floating-container { position: fixed; bottom: 30px; right: 30px; z-index: 999999; cursor: move; touch-action: none; }
        .human-btn { width: 75px; height: 75px; background: radial-gradient(circle, #ff9a9e 0%, #fecfef 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; text-decoration: none; box-shadow: 0 0 20px rgba(255, 105, 180, 0.6); }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
    </style>
</head>

<body onclick="masterInit()" ontouchstart="masterInit()">

    <div id="initOverlay">
        <i class="fas fa-shield-alt" style="font-size: 50px; margin-bottom: 20px; color: var(--neon-blue);"></i>
        <h2 style="font-family: 'Orbitron';">INITIALIZE RAKSHA</h2>
        <p>Tap to start system</p>
    </div>

    <div class="header-container">
        <div class="shield-wrapper" onclick="triggerUpload()">
            <div class="shield-outer"><div class="shield-inner" id="displayProfilePic"></div></div>
        </div>
        <div id="displayHeaderName" style="font-family: 'Orbitron'; font-size: 22px; color: var(--neon-blue);">Raksha Elite</div>
        <input type="file" id="fileInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none;">
    </div>

    <div class="content-container">
        <div style="display:flex; justify-content:space-between; font-size:10px; margin-bottom:15px; color:#aaa; font-family:'Orbitron';">
            <span>STATUS: <b id="systemStatus" style="color:red">OFFLINE</b></span>
            <span>BATTERY: <b id="batDisplay">--%</b></span>
        </div>

        <button class="btn btn-sos" onclick="startEmergency('Manual SOS')">
            <i class="fas fa-biohazard"></i> SOS EMERGENCY
        </button>

        <div style="background: rgba(0, 210, 255, 0.05); padding: 15px; border-radius: 16px; border: 1px solid var(--neon-blue); margin-bottom: 15px;">
            <div style="color: var(--neon-blue); font-weight: bold; margin-bottom: 10px; font-size: 14px;"><i class="fas fa-route"></i> SAFE JOURNEY TIMER</div>
            <input type="text" id="destLat" class="id-input" placeholder="Lat (e.g. 25.6080)">
            <input type="text" id="destLon" class="id-input" placeholder="Lon (e.g. 85.0810)">
            <button class="btn" style="background: var(--neon-blue); color: black; margin-top: 5px;" onclick="startSafeJourney()">START SMART TRACKER</button>
            <div id="journeyStatus" style="font-size: 11px; margin-top: 8px; color: #00d2ff;">Ready to track...</div>
        </div>

        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <button class="btn" onclick="triggerFakeCall()"><i class="fas fa-phone-alt"></i> Fake Call</button>
            <button class="btn" onclick="toggleSettings()"><i class="fas fa-cog"></i> Settings</button>
        </div>

        <div id="settingsPanel" style="display:none; background: #111; padding: 15px; border-radius: 15px; margin-top: 10px;">
            <input type="text" id="userNameInput" class="id-input" placeholder="Your Name">
            <input type="number" id="userChatId" class="id-input" placeholder="Telegram Chat ID">
            <input type="tel" id="userPhone" class="id-input" placeholder="Emergency Phone">
            <button class="btn" style="background:white; color:black; margin-top:10px;" onclick="saveSettings()">SAVE CONFIG</button>
        </div>
    </div>

    <div id="safetyPrompt">
        <i class="fas fa-exclamation-triangle" style="font-size: 50px; color: #ffeb3b; margin-bottom: 20px;"></i>
        <h2 style="font-family: 'Orbitron'; color: white;">ARE YOU SAFE?</h2>
        <p style="color: #ccc;">Time's up! Confirm safety or SOS triggers in:</p>
        <h1 id="promptCountdown" style="color: var(--alert-red); font-size: 60px;">60</h1>
        <div style="display: flex; gap: 15px; width: 80%;">
            <button class="btn" style="background: #4cd964; flex: 1;" onclick="confirmSafe()">I AM SAFE</button>
            <button class="btn" style="background: #ff9800; flex: 1;" onclick="addMoreTime()">+10 MINS</button>
        </div>
    </div>

    <video id="hiddenVideo" autoplay playsinline muted style="display:none;"></video>

    <div id="draggable-human" class="floating-container">
        <a href="https://phantom1729.github.io/Trusted/" target="_blank" class="human-btn">
            <span style="font-size: 35px;">❤️</span>
        </a>
    </div>

    <script>
        const GOOGLE_MAPS_API_KEY = "AIzaSyBx8_qcO9A6SnNZXCKfpURgC1c1RVLKdf4";
        const BOT_TOKEN = "8378037937:AAGjuFdZWLnf0kFfTG_QIFCslgvrDMb-sC4";
        
        let myLat=0, myLon=0, emergencyActive=false, isArmed=false;
        let journeyTimer = null, safetyPromptTimer = null;

        // Firebase Init
        const firebaseConfig = { databaseURL: "https://raksha-network-299bf-default-rtdb.firebaseio.com" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        async function masterInit() {
            if (isArmed) return;
            document.getElementById('initOverlay').style.display = 'none';
            document.getElementById('systemStatus').innerText = 'ARMED';
            document.getElementById('systemStatus').style.color = '#00d2ff';
            isArmed = true;
            navigator.geolocation.watchPosition(pos => {
                myLat = pos.coords.latitude; myLon = pos.coords.longitude;
            }, null, {enableHighAccuracy: true});
            updateBattery();
        }

        async function updateBattery() {
            const bat = await navigator.getBattery();
            document.getElementById('batDisplay').innerText = Math.round(bat.level * 100) + "%";
        }

        // --- GOOGLE POWERED JOURNEY TRACKER ---
        async function startSafeJourney() {
            let latDest = document.getElementById("destLat").value.trim();
            let lonDest = document.getElementById("destLon").value.trim();

            if (latDest.includes(",")) {
                let parts = latDest.split(",");
                latDest = parts[0].trim(); lonDest = parts[1].trim();
            }

            if(!latDest || !lonDest) return alert("Pehle destination coordinates bharein.");
            document.getElementById("journeyStatus").innerText = "Calculating Traffic...";

            try {
                const url = `https://maps.googleapis.com/maps/api/distancematrix/json?origins=${myLat},${myLon}&destinations=${latDest},${lonDest}&mode=driving&departure_time=now&key=${GOOGLE_MAPS_API_KEY}`;
                const res = await fetch(url);
                const data = await res.json();

                if(data.status === "OK") {
                    const element = data.rows[0].elements[0];
                    const duration = element.duration_in_traffic ? element.duration_in_traffic.value : element.duration.value;
                    const totalSecs = duration + (10 * 60); // 10 Min Extra Safety Buffer
                    
                    document.getElementById("journeyStatus").innerText = `ETA: ${Math.ceil(totalSecs/60)} mins (Active)`;
                    clearTimeout(journeyTimer);
                    journeyTimer = setTimeout(showSafetyPrompt, totalSecs * 1000);
                } else { alert("Google API Error: Check Key/Permission"); }
            } catch(e) { alert("Network Error"); }
        }

        function showSafetyPrompt() {
            document.getElementById("safetyPrompt").style.display = "flex";
            let secs = 60;
            if(navigator.vibrate) navigator.vibrate([1000, 500, 1000]);
            
            safetyPromptTimer = setInterval(() => {
                secs--;
                document.getElementById("promptCountdown").innerText = secs;
                if(secs <= 0) {
                    clearInterval(safetyPromptTimer);
                    startEmergency("JOURNEY TIMEOUT - NO RESPONSE");
                    document.getElementById("safetyPrompt").style.display = "none";
                }
            }, 1000);
        }

        function confirmSafe() {
            clearInterval(safetyPromptTimer);
            document.getElementById("safetyPrompt").style.display = "none";
            document.getElementById("journeyStatus").innerText = "Safe at destination ✅";
        }

        function addMoreTime() {
            clearInterval(safetyPromptTimer);
            document.getElementById("safetyPrompt").style.display = "none";
            document.getElementById("journeyStatus").innerText = "Added 10 mins buffer...";
            journeyTimer = setTimeout(showSafetyPrompt, 600000);
        }

        // --- SOS CORE ---
        async function startEmergency(type) {
            if(emergencyActive) return;
            emergencyActive = true;
            const chatID = localStorage.getItem("raksha_chat_id") || "8508792403";
            const user = localStorage.getItem("raksha_user_name") || "User";

            db.ref('global_alerts').push({ lat: myLat, lon: myLon, user: user, timestamp: Date.now() });

            setInterval(() => {
                const msg = `🚨 SOS: ${type}\n👤 ${user}\n📍 Loc: http://maps.google.com/?q=${myLat},${myLon}`;
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${chatID}&text=${encodeURIComponent(msg)}`);
            }, 15000);
            
            startRecording(chatID);
        }

        async function startRecording(id) {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: { facingMode: "environment" } });
            document.getElementById("hiddenVideo").srcObject = stream;
            const rec = new MediaRecorder(stream);
            let chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, { type: "video/webm" });
                const fd = new FormData();
                fd.append("chat_id", id); fd.append("document", blob, "evidence.webm");
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendDocument`, { method: "POST", body: fd });
            };
            rec.start();
            setTimeout(() => rec.stop(), 15000);
        }

        // --- UI & MISC ---
        function triggerFakeCall() { setTimeout(() => alert("Incoming Call: Police Emergency"), 3000); }
        function toggleSettings() { const s = document.getElementById("settingsPanel"); s.style.display = s.style.display==='none'?'block':'none'; }
        function saveSettings() {
            localStorage.setItem("raksha_chat_id", document.getElementById("userChatId").value);
            localStorage.setItem("raksha_user_name", document.getElementById("userNameInput").value);
            alert("Settings Saved!"); location.reload();
        }
        function triggerUpload() { document.getElementById('fileInput').click(); }
        function handleImageUpload(e) {
            const reader = new FileReader();
            reader.onload = ev => {
                localStorage.setItem("raksha_pic", ev.target.result);
                document.getElementById("displayProfilePic").style.backgroundImage = `url(${ev.target.result})`;
            };
            reader.readAsDataURL(e.target.files[0]);
        }

        window.onload = () => {
            const pic = localStorage.getItem("raksha_pic");
            if(pic) document.getElementById("displayProfilePic").style.backgroundImage = `url(${pic})`;
            document.getElementById("userChatId").value = localStorage.getItem("raksha_chat_id") || "";
            document.getElementById("userNameInput").value = localStorage.getItem("raksha_user_name") || "";
        };
    </script>
</body>
</html>
