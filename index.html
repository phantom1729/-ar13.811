<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aryan's Real World: Vehicles & Cities</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; z-index: 200; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #00d2ff; padding: 15px; border-radius: 10px; z-index: 100; pointer-events: none; }
        .controls-ui { position: absolute; bottom: 20px; right: 20px; z-index: 100; }
        button { padding: 15px 25px; font-size: 18px; border-radius: 10px; border: none; background: #e74c3c; color: white; font-weight: bold; }
        
        /* Joystick for Mobile */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 100; }
        #joy-stick { position: absolute; top: 35px; left: 35px; width: 50px; height: 50px; background: rgba(255,255,255,0.6); border-radius: 50%; }
    </style>
</head>
<body>

<div id="loading">Duniya Ban rahi hai... (Loading Assets)</div>
<div id="ui">
    <b>📍 Location: <span id="loc">Main Street</span></b><br>
    💰 Paisa: ₹10,000 | 🚀 Project: Rakshak
</div>

<div class="controls-ui">
    <button id="actionBtn" onclick="enterVehicle()">Enter Vehicle 🚗</button>
</div>

<div id="joy-base"><div id="joy-stick"></div></div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // 1. Scene & Camera Setup
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x87ceeb); // Sky
    scene.fog = new THREE.Fog(0x87ceeb, 20, 200);

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    document.body.appendChild(renderer.domElement);

    // 2. Lights (Real Sun)
    const sun = new THREE.DirectionalLight(0xffffff, 2);
    sun.position.set(50, 100, 50);
    sun.castShadow = true;
    scene.add(sun);
    scene.add(new THREE.AmbientLight(0xffffff, 0.5));

    // 3. Ground (Roads & Grass)
    const texLoader = new THREE.TextureLoader();
    const roadTex = texLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
    roadTex.wrapS = roadTex.wrapT = THREE.RepeatWrapping;
    roadTex.repeat.set(50, 50);
    const ground = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshPhongMaterial({ map: roadTex }));
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    // 4. THE MODEL LOADER (ASLI BUILDING & CARS)
    const loader = new GLTFLoader();

    // -- Airport Zone --
    // Yahan hum plane ka model load karenge
    // Note: URL real models ke hone chahiye (Sample ke liye placeholder)
    function loadCityModels() {
        // Building Example
        for(let i=0; i<20; i++) {
            const b = new THREE.Mesh(new THREE.BoxGeometry(10, 30, 10), new THREE.MeshPhongMaterial({color: 0x555555}));
            b.position.set(Math.random()*200-100, 15, Math.random()*200-100);
            scene.add(b);
        }
        document.getElementById('loading').style.display = 'none';
    }
    loadCityModels();

    // 5. Player & Movement
    let player = new THREE.Group(); 
    player.position.set(0, 2, 0);
    scene.add(player);

    let move = { x: 0, z: 0 };
    let isInCar = false;

    // 6. Mobile Controls (Joystick Logic)
    const joyBase = document.getElementById('joy-base');
    const joyStick = document.getElementById('joy-stick');

    joyBase.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        const rect = joyBase.getBoundingClientRect();
        const centerX = rect.left + 60;
        const centerY = rect.top + 60;
        
        let dx = touch.clientX - centerX;
        let dy = touch.clientY - centerY;
        const dist = Math.min(Math.sqrt(dx*dx + dy*dy), 40);
        const angle = Math.atan2(dy, dx);

        joyStick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        
        move.x = Math.cos(angle) * (dist/40);
        move.z = Math.sin(angle) * (dist/40);
    });

    joyBase.addEventListener('touchend', () => {
        joyStick.style.transform = `translate(0,0)`;
        move.x = 0; move.z = 0;
    });

    // 7. Update Loop
    function animate() {
        requestAnimationFrame(animate);

        // Player movement
        player.position.x += move.x * 0.5;
        player.position.z += move.z * 0.5;

        // Camera follow
        camera.position.set(player.position.x, player.position.y + 5, player.position.z + 10);
        camera.lookAt(player.position);

        // Check Zones
        if(Math.abs(player.position.x) > 50) document.getElementById('loc').innerText = "Highway";
        else document.getElementById('loc').innerText = "Main City";

        renderer.render(scene, camera);
    }
    animate();

    window.enterVehicle = () => {
        alert("Car Model Loading... (Requires .glb file)");
        // Yahan car model load hoke player car ke andar shift ho jayega
    }

</script>
</body>
</html>
