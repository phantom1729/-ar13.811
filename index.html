<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aryan's Mobile Real World 3D</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', sans-serif; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: none; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 8px; pointer-events: none; z-index: 100; font-size: 14px; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 10px; height: 10px; border: 2px solid rgba(255,255,255,0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 90; }
        
        /* Joystick Styles */
        #joystick-container { position: absolute; bottom: 30px; left: 30px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; z-index: 100; touch-action: none; display: none; /* Hidden on desktop */ }
        #joystick-knob { position: absolute; top: 25px; left: 25px; width: 50px; height: 50px; background: rgba(255,255,255,0.5); border-radius: 50%; transition: transform 0.1s ease-out; pointer-events: none; }
    </style>
</head>
<body>

<div id="ui">
    <h3 style="margin:0; color:#3498db">Project: Real World</h3>
    Paisa: ₹<span id="money">1000</span><br>
    Status: <span style="color:#2ecc71">Online (Mobile)</span>
</div>

<div id="crosshair"></div>

<div id="joystick-container">
    <div id="joystick-knob"></div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/examples/jsm/controls/PointerLockControls": "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js"
    }
  }
</script>

<script type="module">
    import * as THREE from 'three';
    import { PointerLockControls } from 'three/examples/jsm/controls/PointerLockControls';

    // Check if Mobile
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
    if (isMobile) {
        document.getElementById('joystick-container').style.display = 'block';
    }

    // --- Scene Setup ---
    const scene = new THREE.Scene();
    scene.fog = new THREE.Fog(0x87ceeb, 10, 150); // REAL WORLD FOG

    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 1, 1000);
    camera.position.y = 2; // Player height

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    // --- Lighting (Sunshine) ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambientLight);

    const directionalLight = new THREE.DirectionalLight(0xffffff, 2);
    directionalLight.position.set(10, 20, 10).normalize();
    scene.add(directionalLight);

    // --- Controls ---
    const controls = new PointerLockControls(camera, renderer.domElement);
    scene.add(controls.getObject());

    // Click to start/look (Desktop)
    if (!isMobile) {
        document.addEventListener('click', () => controls.lock());
    }

    // --- Realistic Environment ---
    const textureLoader = new THREE.TextureLoader();

    // Ground: Grass/Road (REAL WORLD)
    const groundTexture = textureLoader.load('https://threejs.org/examples/textures/terrain/grasslight-big.jpg');
    groundTexture.wrapS = groundTexture.wrapT = THREE.RepeatWrapping;
    groundTexture.repeat.set(200, 200); 

    const groundGeo = new THREE.PlaneGeometry(1000, 1000);
    const groundMat = new THREE.MeshPhongMaterial({ map: groundTexture });
    const ground = new THREE.Mesh(groundGeo, groundMat);
    ground.rotation.x = -Math.PI / 2;
    scene.add(ground);

    // Sky (Blue)
    scene.background = new THREE.Color(0x87ceeb);

    // Buildings (City Feel)
    const buildingGroup = new THREE.Group();
    const buildGeo = new THREE.BoxGeometry(10, 1, 10);
    
    // City Textures for buildings
    const buildTexture = textureLoader.load('https://threejs.org/examples/textures/crate.gif'); // Crate texture placeholder
    const buildMat = new THREE.MeshPhongMaterial({ map: buildTexture });

    for (let i = 0; i < 60; i++) {
        const height = Math.random() * 40 + 10;
        const b = new THREE.Mesh(buildGeo, buildMat);
        b.scale.y = height;
        b.position.set(Math.random() * 400 - 200, (height * 1) / 2, Math.random() * 400 - 200);
        buildingGroup.add(b);
    }
    scene.add(buildingGroup);

    // --- Mobile Joystick Logic ---
    const joystickContainer = document.getElementById('joystick-container');
    const joystickKnob = document.getElementById('joystick-knob');
    let joystickData = { x: 0, y: 0, active: false };

    if (isMobile) {
        joystickContainer.addEventListener('touchstart', (e) => {
            joystickData.active = true;
            handleJoystick(e);
        });

        document.addEventListener('touchmove', (e) => {
            if (joystickData.active) handleJoystick(e);
        });

        document.addEventListener('touchend', () => {
            joystickData.active = false;
            joystickKnob.style.transform = 'translate(0px, 0px)';
            joystickData.x = 0; joystickData.y = 0;
        });

        // Mouse to Look support for mobile
        let touchStartPos = { x: 0, y: 0 };
        document.addEventListener('touchstart', (e) => {
            if(e.target === renderer.domElement) {
                 touchStartPos.x = e.touches[0].pageX;
                 touchStartPos.y = e.touches[0].pageY;
            }
        });
        
        document.addEventListener('touchmove', (e) => {
            if(e.target === renderer.domElement && !joystickData.active) {
                const touchEndPos = { x: e.touches[0].pageX, y: e.touches[0].pageY };
                const delta = { x: touchEndPos.x - touchStartPos.x, y: touchEndPos.y - touchStartPos.y };
                
                // Rotate Camera based on swipe
                camera.rotation.y -= delta.x * 0.005;
                camera.rotation.x -= delta.y * 0.005;
                
                touchStartPos.x = touchEndPos.x;
                touchStartPos.y = touchEndPos.y;
            }
        });
    }

    function handleJoystick(e) {
        const rect = joystickContainer.getBoundingClientRect();
        const center = { x: rect.left + rect.width / 2, y: rect.top + rect.height / 2 };
        const touch = e.touches[0];
        
        let dx = touch.clientX - center.x;
        let dy = touch.clientY - center.y;
        
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxDist = rect.width / 2;
        
        if (dist > maxDist) {
            dx = dx * (maxDist / dist);
            dy = dy * (maxDist / dist);
        }
        
        joystickKnob.style.transform = `translate(${dx}px, ${dy}px)`;
        
        joystickData.x = dx / maxDist; // normalize to -1 to 1
        joystickData.y = -dy / maxDist; // normalize to -1 to 1
    }

    // --- Desktop Keyboard Setup (Alternative) ---
    const keys = { w: false, a: false, s: false, d: false };
    if (!isMobile) {
        document.addEventListener('keydown', (e) => keys[e.code.toLowerCase().replace('key', '')] = true);
        document.addEventListener('keyup', (e) => keys[e.code.toLowerCase().replace('key', '')] = false);
    }

    // --- Animation Loop & Movement Physics ---
    const clock = new THREE.Clock();
    let velocity = new THREE.Vector3();
    let direction = new THREE.Vector3();

    function animate() {
        requestAnimationFrame(animate);

        const delta = clock.getDelta();

        // Simple Physics (Friction, Movement)
        velocity.x -= velocity.x * 10.0 * delta;
        velocity.z -= velocity.z * 10.0 * delta;

        direction.z = 0; direction.x = 0;

        // Apply Keyboard or Joystick
        if (!isMobile && controls.isLocked) {
            if (keys.w) direction.z += 1;
            if (keys.s) direction.z -= 1;
            if (keys.a) direction.x -= 1;
            if (keys.d) direction.x += 1;
        } else if (isMobile && joystickData.active) {
            direction.z = joystickData.y;
            direction.x = joystickData.x;
        }
        
        direction.normalize();

        // Speed settings
        const speed = 150.0;
        if (direction.z !== 0 || direction.x !== 0) {
             velocity.z = direction.z * speed * delta;
             velocity.x = direction.x * speed * delta;
        }

        controls.moveRight(velocity.x);
        controls.moveForward(velocity.z);

        renderer.render(scene, camera);
    }

    animate();

    // --- Window Resize ---
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

</script>
</body>
</html>
