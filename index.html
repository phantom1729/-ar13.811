<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Aryan's Life: Assets & Inventory</title>
    <style>
        :root { --p: #00d2ff; --s: #3a7bd5; --g: #28a745; --r: #dc3545; }
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; transition: 0.5s; }
        body.night { background: #121212; color: white; }
        .night .card { background: #1e1e1e; color: white; border: 1px solid #333; }
        
        .container { max-width: 800px; margin: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .full-width { grid-column: span 2; }

        .stat-bar { background: #eee; height: 10px; border-radius: 5px; margin: 5px 0 15px; overflow: hidden; }
        .fill { height: 100%; transition: 0.4s; }
        
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        
        .shop-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #eee; }
        .owned { color: var(--g); font-weight: bold; }
        #log { font-style: italic; color: #555; margin-top: 10px; min-height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card full-width">
        <div style="display:flex; justify-content: space-between;">
            <h2 style="margin:0">Aryan's Life 🏠</h2>
            <h3 style="color:var(--g)">Bank: ₹<span id="money">1000</span></h3>
        </div>
        <p id="log">Zindagi ki shuruat...</p>
    </div>

    <div class="card">
        <h3>Vital Stats</h3>
        <label>⚡ Energy (<span id="txt-energy">100</span>%)</label>
        <div class="stat-bar"><div id="bar-energy" class="fill" style="width:100%; background:var(--p)"></div></div>
        
        <label>🧠 Mood (<span id="txt-mood">100</span>%)</label>
        <div class="stat-bar"><div id="bar-mood" class="fill" style="width:100%; background:var(--s)"></div></div>

        <label>🚀 Rakshak Project (<span id="txt-project">0</span>%)</label>
        <div class="stat-bar"><div id="bar-project" class="fill" style="width:0%; background:orange"></div></div>
    </div>

    <div class="card">
        <h3>Daily Actions</h3>
        <div class="btn-grid">
            <button style="background:#e3f2fd" onclick="action('work')">💼 Kaam Karo</button>
            <button style="background:#e8f5e9" onclick="action('eat')">🍕 Pizza Khao</button>
            <button style="background:#fff3e0" onclick="action('code')">💻 Code Rakshak</button>
            <button style="background:#f3e5f5" onclick="action('sleep')">😴 So Jao (Next Day)</button>
        </div>
    </div>

    <div class="card full-width">
        <h3>Real World Assets (Inventory)</h3>
        <div id="shop-list">
            </div>
    </div>
</div>

<script>
    let data = JSON.parse(localStorage.getItem('aryan_sim_v3')) || {
        money: 1000, energy: 100, mood: 100, project: 0,
        inventory: { smartphone: false, laptop: false, scooter: false }
    };

    const shop = [
        { id: 'smartphone', name: '📱 iPhone 15', price: 1500, desc: '+10% Mood per action' },
        { id: 'laptop', name: '💻 Gaming Laptop', price: 3000, desc: '2x Coding Speed' },
        { id: 'scooter', name: '🛵 Electric Scooter', price: 5000, desc: 'Save 50% Energy on work' }
    ];

    function update() {
        document.getElementById('money').innerText = data.money;
        document.getElementById('txt-energy').innerText = Math.floor(data.energy);
        document.getElementById('bar-energy').style.width = data.energy + "%";
        document.getElementById('txt-mood').innerText = data.mood;
        document.getElementById('bar-mood').style.width = data.mood + "%";
        document.getElementById('txt-project').innerText = data.project;
        document.getElementById('bar-project').style.width = data.project + "%";

        renderShop();
        localStorage.setItem('aryan_sim_v3', JSON.stringify(data));

        // Night Mode
        const hr = new Date().getHours();
        if(hr > 18 || hr < 6) document.body.classList.add('night');
    }

    function renderShop() {
        let html = '';
        shop.forEach(item => {
            const isOwned = data.inventory[item.id];
            html += `
                <div class="shop-item">
                    <div>
                        <strong>${item.name}</strong><br>
                        <small>${item.desc}</small>
                    </div>
                    ${isOwned ? '<span class="owned">OWNED</span>' : `<button onclick="buy('${item.id}', ${item.price})">Buy ₹${item.price}</button>`}
                </div>`;
        });
        document.getElementById('shop-list').innerHTML = html;
    }

    function action(type) {
        if(data.energy < 10 && type !== 'sleep') return alert("Bohat thak gaye ho!");

        if(type === 'work') {
            let eLoss = data.inventory.scooter ? 10 : 20;
            data.money += 500;
            data.energy -= eLoss;
            data.mood -= 15;
            log("Office mein kaam kiya! ₹500 mile.");
        } else if(type === 'eat') {
            if(data.money >= 200) {
                data.money -= 200;
                data.energy = Math.min(100, data.energy + 40);
                log("Pizza party! Energy full.");
            }
        } else if(type === 'code') {
            let pGain = data.inventory.laptop ? 10 : 5;
            data.project = Math.min(100, data.project + pGain);
            data.energy -= 15;
            data.mood += (data.inventory.smartphone ? 5 : -5);
            log("Coding session complete!");
        } else if(type === 'sleep') {
            data.energy = 100;
            data.mood = Math.min(100, data.mood + 20);
            log("Agli subah ho gayi...");
        }
        update();
    }

    function buy(id, price) {
        if(data.money >= price) {
            data.money -= price;
            data.inventory[id] = true;
            log(`Mubarak ho! Aapne ${id} kharid liya.`);
            update();
        } else {
            alert("Paise kam hain, aur mehnat karo!");
        }
    }

    function log(msg) { document.getElementById('log').innerText = ">> " + msg; }

    update();
</script>
</body>
</html>
